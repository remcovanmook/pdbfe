# CI pipeline — mirrors the pre-commit hook checks so they run on
# every push and PR, regardless of whether the contributor has the
# local git hooks configured.
#
# The version-check job enforces that any PR containing functional
# commits (feat:, fix:, or BREAKING CHANGE) must bump VERSION before
# merging to main. Non-functional PRs (ci:, docs:, refactor:, chore:)
# are exempt.
#
# Jobs are split by component (workers, frontend, security, integrity)
# and run in parallel. Each job fails independently so you can see
# exactly which layer broke.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Workers: type checking + unit tests + upstream conformance ────
  workers:
    name: Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - run: npm ci --ignore-scripts

      - name: TypeScript
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Upstream conformance
        run: npm run test:upstream

  # ── Frontend: type checking + unit tests ─────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/package-lock.json

      # Frontend typecheck depends on tsc from workers/node_modules
      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: workers

      # config.js is gitignored (deployment-specific); use the example stub
      - name: Create config stub
        run: cp js/config.js.example js/config.js
        working-directory: frontend

      - name: TypeScript
        run: npm run typecheck
        working-directory: frontend

      - name: Unit tests
        run: npm run test:unit
        working-directory: frontend

  # ── Security: XSS static analysis ────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: XSS lint
        run: node scripts/lint_xss.js

      - name: XSS lint self-test
        run: node --test scripts/test_lint_xss.js

  # ── Integrity: cross-component consistency checks ────────────────
  integrity:
    name: Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/package-lock.json

      # Schema sync checker imports from workers/api/entities.js
      # which needs @cloudflare/workers-types for tsc, but runs
      # fine in plain Node.js without it. Install for safety.
      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: workers

      - name: Locale completeness
        run: node scripts/check_locales.js

      - name: Bundle size budget
        run: |
          JS_SIZE=$(find frontend/js -name '*.js' -not -path '*/tests/*' | xargs cat | wc -c)
          CSS_SIZE=$(find frontend/css -name '*.css' -not -path '*/third_party/*' | xargs cat | wc -c)
          TOTAL=$((JS_SIZE + CSS_SIZE))
          echo "Frontend JS: ${JS_SIZE} bytes"
          echo "Frontend CSS: ${CSS_SIZE} bytes"
          echo "Total: ${TOTAL} bytes"
          # Fail if total exceeds 512 KB
          if [ "$TOTAL" -gt 524288 ]; then
            echo "::error::Frontend bundle size ${TOTAL} exceeds 512 KB budget"
            exit 1
          fi

  # ── Schema: generated artifact freshness ──────────────────────────
  schema:
    name: Schema Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Install Node dependencies
        run: npm ci --ignore-scripts
        working-directory: workers

      - name: Regenerate schema artifacts
        run: |
          python scripts/parse_django_models.py --force
          python scripts/gen_graphql_schema.py
          python scripts/gen_openapi_spec.py

      - name: Run Python script tests
        run: bash scripts/test.sh

      - name: Check for drift
        run: |
          if ! git diff --exit-code extracted/ frontend/js/entities.js; then
            echo "::error::Generated files are stale. Run: .venv/bin/python scripts/parse_django_models.py --force"
            exit 1
          fi

  # ── Version: enforce bump for functional PRs ──────────────────────
  #
  # Runs only on pull_request events (not on push to main). Reads
  # VERSION from both the PR branch and origin/main, then inspects
  # the commit messages introduced by the PR. If at least one commit
  # is a functional change (feat:, fix:, or BREAKING CHANGE) the
  # VERSION must differ from main — otherwise the job fails.
  #
  # Exempted commit types (no bump required):
  #   ci:, docs:, refactor:, chore:, test:, style:, perf:, build:
  version-check:
    name: Version Bump
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so we can compare against origin/main
          fetch-depth: 0

      - name: Check version bump
        run: |
          PR_VERSION="$(cat VERSION | tr -d '[:space:]')"
          MAIN_VERSION="$(git show origin/main:VERSION 2>/dev/null | tr -d '[:space:]' || echo '')"

          echo "VERSION on this branch : ${PR_VERSION}"
          echo "VERSION on main        : ${MAIN_VERSION}"

          # Collect all commit subjects introduced by this PR (commits
          # reachable from HEAD but not from origin/main).
          COMMITS="$(git log origin/main..HEAD --format='%s' 2>/dev/null || true)"

          if [[ -z "${COMMITS}" ]]; then
            echo "No commits found relative to origin/main — skipping check."
            exit 0
          fi

          echo ""
          echo "Commits in this PR:"
          echo "${COMMITS}"
          echo ""

          # Detect functional commits: feat, fix, or any type with a !
          # (breaking change shorthand), or a commit body with BREAKING CHANGE:.
          FUNCTIONAL=0
          while IFS= read -r subject; do
            # feat: / feat!: / feat(scope):  etc.
            if echo "${subject}" | grep -qE '^(feat|fix)(\([^)]*\))?!?:'; then
              FUNCTIONAL=1
              break
            fi
            # Any type with ! suffix signals a breaking change
            if echo "${subject}" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
              FUNCTIONAL=1
              break
            fi
          done <<< "${COMMITS}"

          # Also scan full commit bodies for BREAKING CHANGE trailers
          if [[ "${FUNCTIONAL}" -eq 0 ]]; then
            BODIES="$(git log origin/main..HEAD --format='%b' 2>/dev/null || true)"
            if echo "${BODIES}" | grep -qE '^BREAKING CHANGE:'; then
              FUNCTIONAL=1
            fi
          fi

          if [[ "${FUNCTIONAL}" -eq 0 ]]; then
            echo "No functional commits detected (only ci:/docs:/refactor:/chore: etc.)."
            echo "Version bump not required."
            exit 0
          fi

          echo "Functional commits detected."

          if [[ "${PR_VERSION}" == "${MAIN_VERSION}" ]]; then
            echo ""
            echo "::error::VERSION (${PR_VERSION}) has not been bumped relative to main."
            echo "::error::Run: ./scripts/bump_version.sh <patch|minor|major>"
            echo "::error::Then commit the updated VERSION file before merging."
            exit 1
          fi

          echo "VERSION bumped: ${MAIN_VERSION} → ${PR_VERSION} ✓"
