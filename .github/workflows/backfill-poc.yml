name: Backfill restricted POC records
on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Import POC records to D1
        run: |
          echo "==> Importing $(wc -l < database/poc_backfill.sql) POC records..."
          wrangler d1 execute peeringdb \
            --config workers/wrangler.toml \
            --remote --yes \
            --file database/poc_backfill.sql

      - name: Update sync meta row count
        run: |
          wrangler d1 execute peeringdb \
            --config workers/wrangler.toml \
            --remote --yes \
            --command "UPDATE _sync_meta SET row_count = (SELECT COUNT(*) FROM peeringdb_network_contact WHERE status='ok') WHERE entity = 'poc'"

      - name: Verify
        run: |
          wrangler d1 execute peeringdb \
            --config workers/wrangler.toml \
            --remote --yes \
            --command "SELECT visible, COUNT(*) as cnt FROM peeringdb_network_contact WHERE status='ok' GROUP BY visible ORDER BY visible"
