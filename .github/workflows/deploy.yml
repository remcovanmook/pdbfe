# Deploy workflow — triggered on push to main (after PR merge).
#
# Runs the deploy script to apply pending D1 migrations and deploy
# all workers + frontend to Cloudflare. Uses --force since we can't
# persist hash files between CI runs.
#
# Required secrets:
#   CLOUDFLARE_API_TOKEN   — Wrangler API token with Workers + D1 + Pages permissions
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID (optional if token is single-account)
#   D1_DATABASE_ID         — PeeringDB D1 database ID
#   D1_USERDB_ID           — Users D1 database ID (pdbfe-users)
#   KV_SESSIONS_ID         — Sessions KV namespace ID
#   API_DOMAIN             — Custom domain (e.g. "pdbfe.dev"), used for API, auth, and frontend origins

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: deploy env
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: |
          pip install pyyaml
          npm ci --prefix workers --ignore-scripts

      # Generate wrangler configs from examples + secrets.
      # The real configs are gitignored (contain deployment-specific IDs).
      # Secrets are passed via env: to avoid shell injection from ${{ }} expansion.
      - name: Generate wrangler configs
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_USERDB_ID: ${{ secrets.D1_USERDB_ID }}
          KV_SESSIONS_ID: ${{ secrets.KV_SESSIONS_ID }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
        run: |
          sed \
            -e "s|<your-d1-database-id>|${D1_DATABASE_ID}|" \
            -e "s|<your-sessions-kv-namespace-id>|${KV_SESSIONS_ID}|" \
            -e "s|<your-users-d1-database-id>|${D1_USERDB_ID}|" \
            -e "s|<your-domain>|${API_DOMAIN}|g" \
            workers/wrangler.toml.example > workers/wrangler.toml

          sed \
            -e "s|<your-d1-database-id>|${D1_DATABASE_ID}|" \
            workers/wrangler-sync.toml.example > workers/wrangler-sync.toml

          sed \
            -e "s|<your-sessions-kv-namespace-id>|${KV_SESSIONS_ID}|" \
            -e "s|<your-users-d1-database-id>|${D1_USERDB_ID}|" \
            -e "s|<your-domain>|${API_DOMAIN}|g" \
            workers/wrangler-auth.toml.example > workers/wrangler-auth.toml

          sed \
            -e "s|<your-d1-database-id>|${D1_DATABASE_ID}|" \
            -e "s|<your-sessions-kv-namespace-id>|${KV_SESSIONS_ID}|" \
            -e "s|<your-users-d1-database-id>|${D1_USERDB_ID}|" \
            -e "s|<your-domain>|${API_DOMAIN}|g" \
            workers/wrangler-graphql.toml.example > workers/wrangler-graphql.toml

          sed \
            -e "s|<your-d1-database-id>|${D1_DATABASE_ID}|" \
            -e "s|<your-sessions-kv-namespace-id>|${KV_SESSIONS_ID}|" \
            -e "s|<your-users-d1-database-id>|${D1_USERDB_ID}|" \
            -e "s|<your-domain>|${API_DOMAIN}|g" \
            workers/wrangler-rest.toml.example > workers/wrangler-rest.toml

          # Frontend config (also gitignored) — all origins derive from API_DOMAIN
          sed \
            -e "s|<your-domain>|${API_DOMAIN}|g" \
            frontend/js/config.js.example > frontend/js/config.js

      - name: Deploy
        run: ./scripts/deploy.sh --remote --apply-migrations --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
