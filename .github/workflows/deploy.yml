# Deploy workflow — triggered on push to main (after PR merge).
#
# Calls deploy.sh for all orchestration (config generation, migrations,
# worker deploys, frontend). No inline shell scripts — deploy.sh is the
# single source of truth for the deploy sequence.
#
# Required secrets:
#   CLOUDFLARE_API_TOKEN   — Wrangler API token. Required permissions:
#                             Workers Scripts:Edit, D1:Edit, Pages:Edit,
#                             Vectorize:Edit, Workers AI:Run,
#                             Account Settings:Read (for account ID resolution)
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID (optional if token is single-account)
#   D1_DATABASE_ID         — PeeringDB D1 database ID
#   D1_USERDB_ID           — Users D1 database ID (pdbfe-users)
#   KV_SESSIONS_ID         — Sessions KV namespace ID
#   API_DOMAIN             — Custom domain (e.g. "pdbfe.dev"), used for API, auth, and frontend origins
#   VECTORIZE_INDEX_NAME   — Vectorize index name for semantic search (e.g. "pdbfe-vectors")

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: deploy env
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: |
          pip install pyyaml
          npm ci --prefix workers --ignore-scripts

      # Generate wrangler toml configs and frontend config.js from .example templates.
      # The real configs are gitignored (contain deployment-specific IDs).
      # All generation logic lives in deploy.sh --generate-configs.
      - name: Generate configs
        run: ./scripts/deploy.sh --generate-configs
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_USERDB_ID: ${{ secrets.D1_USERDB_ID }}
          KV_SESSIONS_ID: ${{ secrets.KV_SESSIONS_ID }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          VECTORIZE_INDEX_NAME: ${{ secrets.VECTORIZE_INDEX_NAME }}

      - name: Deploy
        run: ./scripts/deploy.sh --remote --apply-migrations --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Create an annotated git tag for this release version.
      # Skips gracefully if the tag already exists (e.g. a re-deploy of the
      # same version after a deploy-script-only fix).
      - name: Tag release
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG="v${VERSION}"
          echo "Tagging release: ${TAG}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git tag -a "${TAG}" -m "Release ${TAG}" 2>/dev/null; then
            git push origin "${TAG}"
            echo "Tag ${TAG} created and pushed."
          else
            echo "Tag ${TAG} already exists — skipping."
          fi
