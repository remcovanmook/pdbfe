# Upstream schema sync — checks for new django-peeringdb or PeeringDB
# server releases weekly. If versions changed, regenerates all derived
# artifacts and opens a PR for review.
#
# Can also be triggered manually via workflow_dispatch.

name: Upstream Schema Sync

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Check & Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Need HEAD~1 for diff_schema.py

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: |
          pip install pyyaml
          npm ci --prefix workers --ignore-scripts

      - name: Run schema pipeline
        id: pipeline
        run: |
          python scripts/parse_django_models.py 2>&1 | tee /tmp/pipeline.log
          if grep -q "Versions unchanged" /tmp/pipeline.log; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi


      - name: Generate migration
        if: steps.pipeline.outputs.changed == 'true'
        run: python scripts/diff_schema.py

      - name: Read schema version
        if: steps.pipeline.outputs.changed == 'true'
        id: version
        run: |
          VERSION=$(python -c "import json; print(json.load(open('extracted/entities.json'))['schema_version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.pipeline.outputs.changed == 'true'
        run: |
          BRANCH="auto/schema-${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add extracted/ frontend/js/entities.js database/migrations/
          git commit -m "chore: update schema to ${{ steps.version.outputs.version }}

          Auto-generated by upstream-sync workflow.
          django-peeringdb and/or PeeringDB server version changed."
          git push origin "$BRANCH"
          gh pr create \
            --title "Schema update: ${{ steps.version.outputs.version }}" \
            --body "Automated schema update detected upstream version change.

          **Review the migration file** in \`database/migrations/\` before merging.
          Apply migrations with: \`./scripts/deploy.sh --remote --apply-migrations\`" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.pipeline.outputs.changed == 'false'
        run: echo "Upstream versions unchanged. Nothing to do."
