<!doctype html>
<html lang="en">

<head>
  <title>REST API — PDBFE</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Interactive API documentation for the PeeringDB REST API." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-surface: #ffffff;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      --border: #e5e7eb;
      --accent: #2563eb;
      --header-height: 56px;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --transition-fast: 0.15s ease;
    }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .site-header {
      position: sticky; top: 0; z-index: 100;
      min-height: var(--header-height);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 var(--space-lg);
    }
    .site-header__inner {
      display: flex; align-items: center; gap: var(--space-md);
      width: 100%; margin: 0 auto;
    }
    .site-logo {
      font-size: 1.125rem; font-weight: 700; color: var(--text-primary);
      text-decoration: none; letter-spacing: -0.02em;
    }
    .site-logo span { color: var(--accent); }
    .site-header__nav {
      display: flex; align-items: center; gap: var(--space-sm);
      margin-left: auto;
    }
    .header-external-link {
      font-size: 0.75rem; color: var(--text-muted); text-decoration: none;
      transition: color var(--transition-fast);
    }
    .header-external-link:hover { color: var(--text-secondary); }
  </style>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
</head>

<body style="margin:0">

  <header class="site-header" role="banner">
    <div class="site-header__inner">
      <a href="https://pdbfe.dev/" class="site-logo">PDB<span>FE</span></a>
      <span style="color:var(--text-muted);font-weight:300">|</span>
      <span
        style="font-size:0.85rem;font-weight:600;color:var(--text-secondary);letter-spacing:0.03em;text-transform:uppercase">REST
        API</span>
      <nav class="site-header__nav" aria-label="API navigation">
        <a href="https://graphql.pdbfe.dev/" class="header-external-link">GraphQL</a>
        <a href="https://rest.pdbfe.dev/" class="header-external-link">REST Docs</a>
        <a href="https://pdbfe.dev/about" class="header-external-link">About</a>
      </nav>
    </div>
  </header>

  <div id="api-reference"></div>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  <script>
    Scalar.createApiReference('#api-reference', {
      spec: {
        url: '/openapi.json'
      },
      theme: 'kepler',
    })
  </script>

</body>

</html>
