<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PeeringDB</title>
    <meta name="description" content="PeeringDB — The interconnection database for networks, exchanges, and facilities.">
    <meta name="robots" content="index, follow">

    <!-- OpenGraph -->
    <meta property="og:title" content="PeeringDB">
    <meta property="og:description" content="The interconnection database for networks, exchanges, and facilities.">
    <meta property="og:url" content="https://pdbfe.pages.dev">
    <meta property="og:type" content="website">


    <!-- Fonts (self-hosted) -->
    <link rel="stylesheet" href="/third_party/inter/inter.css">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/index.css?v=4">

    <!-- Favicon placeholder -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
</head>
<body>

    <!-- ── Header ──────────────────────────────────────────────── -->
    <header class="site-header">
        <div class="site-header__inner">
            <a href="/" data-link class="site-logo">Peering<span>DB</span></a>

            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input
                    type="text"
                    class="search-input"
                    id="header-search"
                    placeholder="Search networks, exchanges, facilities..."
                    autocomplete="off"
                >
            </div>

            <nav class="site-header__nav">
                <div id="auth-container" class="auth-container"></div>
                <a href="https://www.peeringdb.com" target="_blank" rel="noopener" class="header-external-link">peeringdb.com ↗</a>
            </nav>
        </div>
    </header>

    <!-- ── Main content area (router renders here) ─────────────── -->
    <main class="main-content page-active" id="app">
        <div class="loading">Loading</div>
    </main>

    <!-- ── Footer ──────────────────────────────────────────────── -->
    <footer class="site-footer">
        <div class="site-footer__grid">
            <div class="site-footer__col">
                <p class="site-footer__copyright">
                    Data sourced from <a href="https://www.peeringdb.com" target="_blank" rel="noopener">PeeringDB</a>.
                    This is a read-only mirror.
                </p>
                <p class="site-footer__copyright">
                    All data is subject to the PeeringDB
                    <a href="https://www.peeringdb.com/aup" target="_blank" rel="noopener">AUP</a>
                    and
                    <a href="https://docs.peeringdb.com/gov/misc/2017-04-02-PeeringDB_Privacy_Policy.pdf" target="_blank" rel="noopener">Privacy Policy</a>.
                </p>
                <p class="site-footer__sync-line">
                    <span id="sync-status" class="site-footer__sync"></span>
                </p>
            </div>

            <div class="site-footer__col">
                <h4 class="site-footer__heading">Navigation</h4>
                <ul class="site-footer__links">
                    <li><a href="/about" data-link>About</a></li>
                    <li><a href="/search?q=" data-link>Search</a></li>
                </ul>
            </div>

            <div class="site-footer__col">
                <h4 class="site-footer__heading">Resources</h4>
                <ul class="site-footer__links">
                    <li><a href="https://www.peeringdb.com/apidocs" target="_blank" rel="noopener">API Documentation</a></li>
                </ul>
            </div>

            <div class="site-footer__col">
                <h4 class="site-footer__heading">Customize</h4>
                <p class="site-footer__lang-line">🌐 <select id="lang-select" class="site-footer__lang-select"></select></p>
                <p class="site-footer__lang-line">🎨 <select id="theme-select" class="site-footer__lang-select"></select></p>
            </div>

        </div>
    </footer>

    <!-- ── Templates (parsed once, never rendered) ──────────── -->
    <template id="tpl-info-field">
        <div class="info-field">
            <span class="info-field__label"></span>
            <span class="info-field__value"></span>
        </div>
    </template>

    <template id="tpl-info-group">
        <div class="info-group">
            <div class="info-group__title"></div>
        </div>
    </template>

    <template id="tpl-stats-item">
        <div class="stats-bar__item">
            <span class="stats-bar__value"></span>
            <span class="stats-bar__label"></span>
        </div>
    </template>

    <template id="tpl-typeahead-item">
        <div class="search-dropdown__item">
            <span class="search-dropdown__item-name"></span>
            <span class="search-dropdown__item-sub"></span>
        </div>
    </template>

    <!-- ── Scripts ─────────────────────────────────────────────── -->
    <script type="module" src="/js/boot.js"></script>

</body>
</html>
