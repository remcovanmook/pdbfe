<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PeeringDB</title>
    <meta name="description" content="PeeringDB — The interconnection database for networks, exchanges, and facilities.">
    <meta name="robots" content="index, follow">

    <!-- Fonts (self-hosted) -->
    <link rel="stylesheet" href="/third_party/inter/inter.css">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/index.css">

    <!-- Favicon placeholder -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
</head>
<body>

    <!-- ── Header ──────────────────────────────────────────────── -->
    <header class="site-header">
        <div class="site-header__inner">
            <a href="/" data-link class="site-logo">Peering<span>DB</span></a>

            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input
                    type="text"
                    class="search-input"
                    id="header-search"
                    placeholder="Search networks, exchanges, facilities..."
                    autocomplete="off"
                >
            </div>

            <nav>
                <a href="https://www.peeringdb.com" target="_blank" rel="noopener" style="font-size:0.75rem;color:var(--text-muted)">peeringdb.com ↗</a>
            </nav>
        </div>
    </header>

    <!-- ── Main content area (router renders here) ─────────────── -->
    <main class="main-content page-active" id="app">
        <div class="loading">Loading</div>
    </main>

    <!-- ── Footer ──────────────────────────────────────────────── -->
    <footer class="site-footer">
        <p class="site-footer__text">
            Data sourced from <a href="https://www.peeringdb.com" target="_blank" rel="noopener">PeeringDB</a>.
            This is a read-only mirror.
            <span class="site-footer__sep" aria-hidden="true">·</span>
            <span id="sync-status" class="site-footer__sync"></span>
        </p>
    </footer>

    <!-- ── Scripts ─────────────────────────────────────────────── -->
    <script type="module" src="/js/boot.js"></script>

</body>
</html>
